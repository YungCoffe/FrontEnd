<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Acesso</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('fundo.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
      max-width: 380px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      color: white;
    }

    h2 { text-align: center; margin-bottom: 25px; }
    label { display: block; margin-bottom: 5px; font-size: 14px; }
    input { 
      width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; 
      border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); color: white; 
    }
    button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .btn-principal { background: #8a2be2; color: white; }
    .btn-secundario { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
    #TelaCadastro { display: none; }
  </style>
</head>
<body>

  <div class="card" id="TelaLogin">
    <h2>Entrar</h2>
    <label>Usuário</label>
    <input type="text" id="usuario" placeholder="Digite seu usuário">
    <label>Senha</label>
    <input type="password" id="Senha" placeholder="Digite sua senha">
    <button class="btn-principal" onclick="Logar()">Entrar</button>
    <button class="btn-secundario" onclick="AlternarTela()">Criar conta</button>
  </div>

  <div class="card" id="TelaCadastro">
    <h2>Cadastrar</h2>
    <label>Novo usuário</label>
    <input type="text" id="CADusuario" placeholder="Crie seu nome de usuário">
    <label>Senha (mínimo 8 dígitos)</label>
    <input type="password" id="CADsenha" placeholder="Crie sua senha">
    <button class="btn-principal" onclick="Cadastrar()">Finalizar Cadastro</button>
    <button class="btn-secundario" onclick="AlternarTela()">Voltar</button>
  </div>

  <script>
    function AlternarTela() {
        let login = document.getElementById("TelaLogin");
        let cadastro = document.getElementById("TelaCadastro");
        login.style.display = (login.style.display === "none") ? "block" : "none";
        cadastro.style.display = (cadastro.style.display === "none") ? "block" : "none";
    }

    function Cadastrar() {
        let user = document.getElementById("CADusuario").value;
        let pass = document.getElementById("CADsenha").value;

        // 1. Verifica campos vazios
        if (!user || !pass) {
            alert("Preencha todos os campos!");
            return;
        }

        // 2. Verifica tamanho da senha
        if (pass.length < 8) {
            alert("A senha deve ter pelo menos 8 dígitos!");
            return;
        }

        // 3. Verifica se usuário já existe
        if (localStorage.getItem(user) !== null) {
            alert("Este nome de usuário já está em uso! Escolha outro.");
            return;
        }

        // 4. Salva no LocalStorage
        localStorage.setItem(user, pass);
        alert("Cadastro realizado com sucesso!");
        
        // Limpa campos e volta para login
        document.getElementById("CADusuario").value = "";
        document.getElementById("CADsenha").value = "";
        AlternarTela();
    }

    function Logar() {
        let user = document.getElementById("usuario").value;
        let pass = document.getElementById("Senha").value;

        if (localStorage.getItem(user) === pass && localStorage.getItem(user) !== null) {
            alert("Bem-vindo, " + user + "!");
        } else {
            alert("Usuário ou senha incorretos!");
        }
    }
  </script>
</body>
</html>
